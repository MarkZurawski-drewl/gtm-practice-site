<body>

<nav>
  <span class="brand">Kestrel Ops</span>
  <a href="index.html">Home</a>
  <a href="pricing.html">Pricing</a>
  <a href="contact.html">Get a Quote</a>
</nav>

<main>
  <h1>Tell us about your team</h1>
  <p class="lead">We'll put together a quote based on your team size and what you're trying to fix.</p>

  <form id="lead-form">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Work Email</label>
    <input type="email" id="email" name="email" required>

    <label for="company">Company Name</label>
    <input type="text" id="company" name="company" required>

    <label for="company_size">Company Size</label>
    <select id="company_size" name="company_size" required>
      <option value="">Select one...</option>
      <option value="1-10">1-10 employees</option>
      <option value="11-50">11-50 employees</option>
      <option value="51-200">51-200 employees</option>
      <option value="201+">201+ employees</option>
    </select>

    <label for="message">What are you hoping to solve?</label>
    <textarea id="message" name="message"></textarea>

    <div style="margin-top:24px;">
      <button type="submit" id="submit-quote" class="btn">Request Quote</button>
    </div>
  </form>
</main>

<footer>Kestrel Ops — practice/demo site, not a real company.</footer>

<script>
  // Pre-fills a hidden note if a plan tier came in via the URL
  // (?tier=...) from the pricing page — realistic pattern for
  // stitching cross-page journey context together.
  var params = new URLSearchParams(window.location.search);
  var tier = params.get('tier');

  document.getElementById('lead-form').addEventListener('submit', function(e){
    e.preventDefault();

    var formData = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      company: document.getElementById('company').value,
      company_size: document.getElementById('company_size').value,
      selected_tier: tier || 'not_specified'
    };

    // Push a form_submit event with field values as parameters —
    // this is the realistic "capture a specific field as an event
    // parameter" pattern worth drilling in GTM (e.g. reading this
    // via Data Layer Variables for a GA4 event tag).
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: 'quote_form_submit',
      lead_company_size: formData.company_size,
      lead_selected_tier: formData.selected_tier
    });

    // Simulate a real submission, then redirect to the "destination"
    // page — the classic conversion-on-pageview pattern.
    setTimeout(function(){
      window.location.href = 'thank-you.html';
    }, 400);
  });
</script>
</body>
</html>
